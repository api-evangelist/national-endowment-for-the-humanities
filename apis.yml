aid: national-endowment-for-the-humanities
name: National Endowment for the Humanities
description: >-
  The National Endowment for the Humanities (NEH) is the nation's largest
  public funder of the humanities, which include history, philosophy,
  literature, language, ethics, law, archaeology, political theory, comparative
  religion, anthropology, sociology, and media and cultural studies. NEH does
  not publish a fully documented public REST API, but it offers a Funded
  Project Query Form API and bulk XML datasets covering all grants awarded
  since 1965, plus evaluator and panelist information from 1988 onward.
